<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password – DUT Wellness</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root{--dut-blue:#003087;--dut-gold:#FFB81C;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;min-height:100vh;background:linear-gradient(135deg,#001a5c,#003087,#0050c8);display:flex;align-items:center;justify-content:center;padding:2rem;}
    .card{background:white;border-radius:20px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
    .logo{width:52px;height:52px;background:var(--dut-blue);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--dut-gold);margin:0 auto 1.5rem;}
    h2{font-family:'Playfair Display',serif;font-size:1.6rem;text-align:center;color:#1a1a2e;margin-bottom:0.5rem;}
    p{text-align:center;font-size:0.85rem;color:#888;margin-bottom:1.5rem;}
    label{display:block;font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:#555;margin-bottom:5px;}
    .input-wrap{position:relative;margin-bottom:1.5rem;}
    .icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#bbb;font-size:0.85rem;}
    input{width:100%;padding:11px 12px 11px 36px;border:1.5px solid #e0e0e0;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s;}
    input:focus{border-color:var(--dut-blue);box-shadow:0 0 0 3px rgba(0,48,135,0.08);}
    .btn{width:100%;padding:12px;background:var(--dut-blue);color:white;border:none;border-radius:10px;font-size:0.95rem;font-weight:600;cursor:pointer;transition:background 0.2s;}
    .btn:hover{background:#00267a;}
    .back-link{display:block;text-align:center;margin-top:1rem;font-size:0.82rem;color:var(--dut-blue);text-decoration:none;font-weight:600;}
    .flash-container{position:fixed;top:20px;right:20px;z-index:9999;}
    .flash{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;font-size:0.85rem;margin-bottom:8px;box-shadow:0 4px 16px rgba(0,0,0,0.12);}
    .flash-info{background:#eff6ff;border:1px solid #93c5fd;color:#1e40af;}
    .flash-success{background:#f0fdf4;border:1px solid #86efac;color:#166534;}
    .flash-danger{background:#fef2f2;border:1px solid #fca5a5;color:#991b1b;}
    .flash-close{background:none;border:none;cursor:pointer;font-size:1rem;margin-left:auto;opacity:0.5;}
  </style>
</head>
<body>
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}<div class="flash-container">{% for cat,msg in messages %}<div class="flash flash-{{ cat }}">{{ msg }}<button onclick="this.parentElement.remove()" class="flash-close">&times;</button></div>{% endfor %}</div>{% endif %}
  {% endwith %}
  <div class="card">
    <div class="logo">DUT</div>
    <h2>Forgot Password?</h2>
    <p>Enter your registered email address and we'll send you a password reset link.</p>
    <form method="POST">
      <label>Email Address</label>
      <div class="input-wrap">
        <i class="fa-solid fa-envelope icon"></i>
        <input type="email" name="email" placeholder="your@email.com" required>
      </div>
      <button type="submit" class="btn"><i class="fa-solid fa-paper-plane"></i> Send Reset Link</button>
    </form>
    <a href="{{ url_for('login') }}" class="back-link">← Back to Login</a>
  </div>
</body>
</html>
