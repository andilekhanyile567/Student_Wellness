<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – DUT Wellness</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root { --blue:#003087; --gold:#FFB81C; --danger:#e74c3c; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #001a5c, #003087, #0050c8);
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo-row {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 1.8rem;
    }
    .logo-box {
      width: 46px; height: 46px;
      background: var(--blue); border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-weight: 700; font-size: 1.1rem; color: var(--gold);
      flex-shrink: 0;
    }
    .logo-row h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: #1a1a2e; }
    .logo-row p  { font-size: 0.78rem; color: #888; margin-top: 2px; }

    .form-group { margin-bottom: 1rem; }
    label {
      display: block; font-size: 0.75rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.04em;
      color: #555; margin-bottom: 5px;
    }
    .input-wrap { position: relative; }
    .icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%); color: #bbb; font-size: 0.82rem;
      pointer-events: none;
    }
    input, select {
      width: 100%; padding: 11px 12px 11px 36px;
      border: 1.5px solid #e0e0e0; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
      color: #1a1a2e; outline: none; background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(0,48,135,0.08);
      background: white;
    }
    .pw-wrap { position: relative; }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: #bbb; font-size: 0.85rem;
    }

    .btn {
      width: 100%; padding: 13px;
      background: var(--blue); color: white;
      border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; font-weight: 600;
      cursor: pointer; margin-top: 0.5rem;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:hover  { background: #00267a; }
    .btn:active { transform: scale(0.99); }

    .footer-link {
      text-align: center; margin-top: 1.2rem;
      font-size: 0.82rem; color: #888;
    }
    .footer-link a { color: var(--blue); font-weight: 600; text-decoration: none; }

    /* flash */
    .flash-container { position: fixed; top: 20px; right: 20px; z-index: 9999; width: 320px; }
    .flash {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px; border-radius: 10px;
      font-size: 0.84rem; margin-bottom: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .flash-danger  { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }
    .flash-success { background: #f0fdf4; border: 1px solid #86efac; color: #166534; }
    .flash-info    { background: #eff6ff; border: 1px solid #93c5fd; color: #1e40af; }
    .flash-close   { background: none; border: none; cursor: pointer; margin-left: auto; opacity: 0.5; font-size: 1rem; }
  </style>
</head>
<body>

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  <div class="flash-container">
    {% for cat, msg in messages %}
    <div class="flash flash-{{ cat }}">
      <i class="fa-solid {% if cat == 'success' %}fa-circle-check{% elif cat == 'danger' %}fa-circle-exclamation{% else %}fa-circle-info{% endif %}"></i>
      {{ msg }}
      <button onclick="this.parentElement.remove()" class="flash-close">&times;</button>
    </div>
    {% endfor %}
  </div>
  {% endif %}
  {% endwith %}

  <div class="card">
    <div class="logo-row">
      <div class="logo-box">DUT</div>
      <div>
        <h1>Create Account</h1>
        <p>DUT Wellness Centre Portal</p>
      </div>
    </div>

    <form method="POST" action="{{ url_for('register') }}">

      <div class="form-group">
        <label>Student Number *</label>
        <div class="input-wrap">
          <i class="fa-solid fa-id-card icon"></i>
          <input type="text" name="student_number" placeholder="e.g. 21200001" required autofocus>
        </div>
      </div>

      <div class="form-group">
        <label>Full Name *</label>
        <div class="input-wrap">
          <i class="fa-solid fa-user icon"></i>
          <input type="text" name="full_name" placeholder="First and Last Name" required>
        </div>
      </div>

      <div class="form-group">
        <label>Email Address *</label>
        <div class="input-wrap">
          <i class="fa-solid fa-envelope icon"></i>
          <input type="email" name="email" placeholder="21200001@dut4life.ac.za" required>
        </div>
      </div>

      <div class="form-group">
        <label>Password * <span style="font-weight:400;text-transform:none;font-size:0.7rem;">(min 8 characters)</span></label>
        <div class="input-wrap pw-wrap">
          <i class="fa-solid fa-lock icon"></i>
          <input type="password" name="password" id="pw" placeholder="Create a password" required>
          <button type="button" class="pw-toggle" onclick="togglePw('pw','eye1')">
            <i class="fa-solid fa-eye" id="eye1"></i>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>Confirm Password *</label>
        <div class="input-wrap pw-wrap">
          <i class="fa-solid fa-lock icon"></i>
          <input type="password" name="confirm_password" id="pw2" placeholder="Repeat password" required>
          <button type="button" class="pw-toggle" onclick="togglePw('pw2','eye2')">
            <i class="fa-solid fa-eye" id="eye2"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn">
        <i class="fa-solid fa-user-plus"></i> Register
      </button>
    </form>

    <div class="footer-link">
      Already registered? <a href="{{ url_for('login') }}">Sign in →</a>
    </div>
  </div>

<script>
  function togglePw(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      input.type = 'password';
      icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
  }
</script>
</body>
</html>
